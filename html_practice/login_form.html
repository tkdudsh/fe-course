<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      #All {
        width: 600px;
        height: 600px;
        margin: auto;
      }
      #icon {
        font-size: 150px;
        margin-top: 100px;
        margin-bottom: 30px;
      }

      #Main-box {
        width: 250px;
        background-color: brown;
        text-align: center;
        margin: auto;
      }

      #InputInfo input {
        margin-top: 10px;
        width: 100%;
        height: 25px;
        border-radius: 5px;
        border: none;
      }
      #Radio-Option {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: bisque;
        margin-top: 5px;
      }
      button {
        background-color: green;
        width: 130px;
        height: 30px;
        border-radius: 10px;
        border: none;
        color: white;
        margin-bottom: 50px;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <form action="" method="get">
      <div id="All" style="background-color: brown">
        <header>
          <i
            class="fa-solid fa-crown"
            style="color: rgb(255, 212, 59); margin: 10px"
          ></i>
        </header>
        <main>
          <div id="Main-box">
            <div id="icon">
              <i class="fa-regular fa-circle-user" style="color: black"></i>
            </div>
            <section id="InputInfo">
              <article>
                <label for="id"></label>
                <input type="text" name="id" placeholder="Id" />
              </article>
              <article>
                <label for="password"></label>
                <input type="password" name="password" placeholder="Pass" />
              </article>
            </section>
            <section id="Radio-Option">
              <article>
                <input type="radio" value="remember" name="remember" />
                <label for="remember">Remember me</label>
              </article>
              <article>
                <input type="radio" value="Forgot" name="Forgot" />
                <label for="Forgot">Forgot your password?</label>
              </article>
            </section>
            <article>
              <button type="submit">Login</button>
            </article>
          </div>
        </main>
        <footer></footer>
      </div>
    </form>
  </body>
</html>
