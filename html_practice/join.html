<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입폼</title>
    <style>
      section {
        margin: 40px;
      }
      article {
        font-size: 10px;
      }
      #input1 input {
        width: 250px;
      }
      button {
        margin: 10px;
        width: 130px;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <form action="get">
      <div style="border: 1px solid black; width: 400px; margin: auto">
        <h1 style="text-align: center">회원가입</h1>

        <div style="margin: auto">
          <span style="background-color: blue; color: white; margin-left: 30px"
            >필수항목</span
          >

          <main>
            <section id="input1">
              <article>
                <label for="id">아이디</label><br />
                <input type="text" name="id" />
              </article>
              <article>
                <label for="pass">비밀번호</label><br />
                <input type="password" name="pass" />
              </article>
              <article>
                <label for="email">이메일</label><br />
                <input
                  type="email"
                  name="email"
                  placeholder="example@email.com"
                />
              </article>
              <article>
                <label for="name">성명</label><br />
                <input type="text" name="name" />
              </article>
              <article>
                <label for="age">나이</label><br />
                <input type="text" name="age" />
              </article>
            </section>
            <div>
              <span
                style="background-color: blue; color: white; margin-left: 30px"
                >당신에 대해서 알고 싶어요!</span
              >
            </div>

            <section>
              <article>
                <p>취미를 선택해 주세요.</p>
                <input type="radio" value="hobby" />게임하기
                <input type="radio" value="hobby" />음악듣기
                <input type="radio" value="hobby" />아이스음료 마시기
              </article>

              <article>
                <p>좋아하는 음료를 선택해 주세요(중복선택가능)</p>
                <input type="checkbox" />쉐이크 종류 음료
                <input type="checkbox" />티 종류 음료
                <input type="checkbox" />커피 종류 음료
              </article>

              <article>
                <span>동아리 참석 가능 날짜 :</span>
                <input type="date" />
              </article>
              <article>
                <span>얼.죽.아에서 참여하고 싶은 모임은? :</span>
                <select name="meet">
                  <option value="선택">--선택해주세요--</option>
                  <option value="볼링">--볼링--</option>
                  <option value="당구">--당구--</option>
                  <option value="탁구">--탁구--</option>
                </select>
              </article>
              <article>
                <p>포트폴리오 제출하기</p>
                <input type="file" name="portfolio" />
              </article>
              <article>
                <p>마지막으로 하고 싶은 말은?</p>
                <textarea
                  name="message"
                  rows="10px"
                  cols="40px"
                  placeholder=""
                ></textarea>
                <button
                  type="reset"
                  style="
                    background-color: black;
                    color: white;
                    border: none;
                    border-radius: 5px;
                  "
                >
                  다시하기
                </button>
                <button
                  type="submit"
                  style="
                    background-color: blue;
                    color: white;
                    border: none;
                    border-radius: 5px;
                  "
                >
                  제출하기
                </button>
              </article>
            </section>
          </main>
        </div>
      </div>
    </form>
  </body>
</html>
