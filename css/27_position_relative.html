<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .p2 {
        border: 1px solid red;
        position: relative;
      }
      span {
        border: 5px solid blue;
        position: absolute;
        top: 100px;
        left: 0;
      }
      .p {
        width: 500px;
        height: 500px;
        border: 1px solid black;
        position: relative;
      }
    </style>
  </head>
  <body>
    <h1>Position-relative</h1>
    <div class="p2">element1</div>
    <div class="p">
      <span>element2</span>
    </div>
  </body>
</html>
