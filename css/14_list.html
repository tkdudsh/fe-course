<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        background: peru;
        list-style-type: square;
        padding: 0;
      }
      li {
        background-color: beige;
      }
      ol {
        background-color: navajowhite;
        list-style-type: none;
      }
      h3 {
        border: 3px solid black;
      }
    </style>
  </head>
  <body>
    <h1>LIst Style</h1>
    <ul>
      <h3>프론트엔드</h3>
      <li>html</li>
      <li>css</li>
    </ul>
    <ol>
      <h3>백엔드</h3>
      <li>jsp</li>
      <li>asp</li>
      <li>nodejs</li>
    </ol>
  </body>
</html>
