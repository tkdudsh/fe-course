<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Starbucks Layout" />
    <title>Starbucks Layout</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Nanum Gothic";
        /* background-color: #f6f5ef; */
        margin: 0;
        margin: 5px 0px;
      }
      header {
        width: 80%;
        margin: auto;
        display: flex;
        justify-content: space-between;
      }
      .header-menu-top ul,
      .header-menu-bot ul {
        display: flex;
        list-style: none;
        justify-content: right;
        align-items: center;
      }
      .header-menu-top ul a,
      .header-menu-bot ul a {
        text-decoration: none;
        color: #333;
      }
      .header-menu-top ul {
        gap: 20px;
        font-size: 0.8em;
      }
      .header-menu-bot ul {
        gap: 20px;
      }
      .header-menu-bot a {
        letter-spacing: 0.5px;
        /* letter spacing은 단어의 문자사이의 공간을 늘려줌 */
      }
      .header-menu-top li:last-child {
        border: 2px solid gray;
        padding: 3px;
        border-radius: 4px;
        background-color: white;
      }
      .header-menu-top li:last-child i {
        font-size: 1.2em;
        background-color: white;
      }
      .header-menu-top li:last-child input {
        display: none;
      }
      .banner {
        width: 100%;
        height: 32vw; /* viewport변환공식은 vw= (이미지 출력 높이px/해상도 너비)*100 (세로 비율 맞춰서 이미지 맞출 때 ) */
        background-image: url("https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg");
        background-repeat: no-repeat;
        background-position: 50% 50%;
        /* 50% 50 % == center */
        background-size: cover;
        margin: 0;
        position: relative;
      }

      .banner-font1 button {
        position: absolute;
        top: 63%;
        left: 18%;
        border-style: none;
        background-color: #fcdde3;
        border: 2px solid #b28bbd;
        border-radius: 5px;
        padding: 7px 13px;
        color: #b28bbd;
      }
      .banner-font1 button:hover {
        background-color: #b28bbd;
        color: white;
      }

      .banner-font img {
        width: 28vw;
        position: absolute;
        top: 35%;
        left: 10%;
      }
      .drink-img img {
        width: 12vw;
      }

      .img1 {
        position: absolute;
        top: 17%;
        left: 40%;
      }
      .img2 {
        position: absolute;
        top: 27%;
        left: 50%;
      }
      .img3 {
        position: absolute;
        top: 22%;
        left: 58%;
      }
      .img4 {
        position: absolute;
        top: 17%;
        left: 69%;
      }
      .img5 {
        position: absolute;
        top: 16%;
        left: 79%;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
        }
      }

      .img1,
      .img2,
      .img3,
      .img4,
      .img5 {
        animation: fadeInUp 1s ease forwards;
      }
      .banner-font {
        animation-delay: 0s;
      }
      .img1 {
        animation-delay: 0.5s;
      }
      .img2 {
        animation-delay: 1s;
      }
      .img3 {
        animation-delay: 1.5s;
      }
      .img4 {
        animation-delay: 2s;
      }
      .img5 {
        animation-delay: 2.5s;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-Logo">
        <img
          src="https://www.starbucks.co.kr/common/img/common/logo.png"
          alt="lOGO"
        />
      </div>
      <div class="header-menu">
        <nav class="header-menu-top">
          <ul>
            <li><a href="">SIGN IN</a></li>
            <li><a href="">MY STARBUCKS</a></li>
            <li><a href="">CUSTOMER SERVICE & IDEAS</a></li>
            <li><a href="">FIND A STORE</a></li>
            <li>
              <input type="text" name="search" />
              <a href=""><i class="fa-solid fa-magnifying-glass"></i></a>
            </li>
          </ul>
        </nav>
        <nav class="header-menu-bot">
          <ul>
            <li><a href="">COFFEE</a></li>
            <li><a href="">MENU</a></li>
            <li><a href="">STORE</a></li>
            <li><a href="">ESG</a></li>
            <li><a href="">STARBUCKS REWARDS</a></li>
            <li><a href="">CORPORATE SALES</a></li>
            <li><a href="">WHAT'S NEW</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="banner">
        <div class="banner-font1">
          <div class="banner-font">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png"
              alt=""
            />
          </div>
          <button>자세히보기</button>
        </div>

        <div class="drink-img">
          <div class="img1">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png"
              alt=""
            />
          </div>
          <div class="img2">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png"
              alt=""
            />
          </div>
          <div class="img3">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png"
              alt=""
            />
          </div>
          <div class="img4">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png"
              alt=""
            />
          </div>
          <div class="img5">
            <img
              src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png"
              alt=""
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
