<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .text {
        text-shadow: 10px 5px 0px rgba(222, 12, 12, 0.5);
      }
      .box {
        width: 300px;
        height: 300px;
        background-color: red;
        box-shadow: 13px 6px 0px 1px rgba(0, 0, 0, 0.49);
        -webkit-box-shadow: 13px 6px 0px 1px rgba(0, 0, 0, 0.49);
        -moz-box-shadow: 13px 6px 0px 1px rgba(0, 0, 0, 0.49);
      }
    </style>
  </head>
  <body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-shadow</h2>
    <h2 class="box">Box-shadow</h2>
  </body>
</html>
