<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Universal Selector" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <title>Universal select</title>
    <style>
      /* 공통 프로퍼티를 변수로 정의 */
      :root {
        --color-main: red;
        /* var(--color-main)으로 호출 */
      }
      * {
        background-color: lightgray;
        /* font-family: "맑은 고딕"; */
        font-family: "Open Sans", sans-serif;

        margin: 0;
      }
      h1 {
        background-color: var(--color-main);
      }
    </style>
  </head>
  <body>
    <h1>Universal Selector</h1>
    <div>
      <h3>Sub Title</h3>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Tenetur omnis
        cupiditate aperiam nobis provident vel accusantium, deleniti iure sint,
        quas non, distinctio consequuntur suscipit modi pariatur excepturi
        aspernatur magni reprehenderit.
      </p>
    </div>
  </body>
</html>
