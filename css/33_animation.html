<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation</title>
    <style>
      .box {
        width: 250px;
        height: 250px;
        border: 1px brown solid;
      }
      .box:hover {
        animation: changeColor 3s 0s 3;
        /* 3초간 진행, delay는 0초, 한번만 진행 */
      }
      @keyframes changeColor {
        from {
          /* animation 시작할 때 주어질 스타일 정의 */
          background-color: red;
        }
        50% {
          /* 50퍼센트정도 진행될 때 스타일 */
          background-color: orange;
        }

        to {
          /* animation 종료할 때 주어질 스타일 정의 */
          background-color: yellow;
        }
      }
      .box-image {
        background-image: url(../images/patter1감독판.png);
        width: 100%;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }
      img {
        width: 100px;
        height: 100px;
        opacity: 0;
      }
      .img1,
      .img2,
      .img3,
      .img4,
      .img5 {
        animation: fadeInUp 1s ease forwards;
      }
      .img1 {
        animation-delay: 0s;
      }
      .img2 {
        animation-delay: 1s;
      }
      .img3 {
        animation-delay: 2s;
      }
      .img4 {
        animation-delay: 3s;
      }
      .img5 {
        animation-delay: 4s;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <h1>Animation Style</h1>
    <div class="box">box animation</div>
    <div class="box-image">
      <img src="../images/검은여자.ico" alt="ico" class="img1" />
      <img src="../images/검은여자.ico" alt="ico" class="img2" />
      <img src="../images/검은여자.ico" alt="ico" class="img3" />
      <img src="../images/검은여자.ico" alt="ico" class="img4" />
      <img src="../images/검은여자.ico" alt="ico" class="img5" />
    </div>
  </body>
</html>
