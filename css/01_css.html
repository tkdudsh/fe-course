<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Css 사용법" />
    <link rel="stylesheet" href="../css/external.css" />
    <title>Document</title>
    <style>
      h2 {
        color: brown;
      }
      span {
        color: green;
      }
    </style>
  </head>
  <body>
    <header>
      <!-- 1. inline : HTML Element에 CSS style attribute(속성)추가해서 사용.-->
      <!-- 2.internal : HTML <head> Element에 <style> Element 추가 - selector 사용 -->
      <!-- 3.External : stylee 속성을 별도의 .css 파일로 저장하고 필요시 link로 호출 -->
      <h1 style="color: peru">CSS 사용법</h1>
      <h2><span>1.</span> inline</h2>
      <h2><span>2.</span> internal</h2>
      <h2><span>3.</span> external</h2>
    </header>
  </body>
</html>
