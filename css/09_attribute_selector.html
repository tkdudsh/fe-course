<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Attribute_ selector" />
    <title>Attribute_selector</title>
    <style>
      a[href="http://www.naver.com"] {
        color: brown;
        text-decoration: none;
      }
      a[target="_self"] {
        color: steelblue;
        text-decoration: none;
      }
      a[href="http://www.naver.com"],
      a[href="http://www.daum.net"] {
        background-color: tan;
      }
      /* ^= inner로 시작하는 모든 class 속성을 대상으로 함. */
      a[class^="inner"] {
        background-color: blanchedalmond;
      }
      a[href="#"] {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Attribute Selector</h1>
    <a href="#">테스트1</a>
    <a href="http://www.naver.com" target="_blank">네이버</a>
    <a href="http://www.google.com" target="_self">구글</a>
    <a href="http://www.daum.net" target="_blank">다음</a>
    <a href="#" class="inner_2">테스트2</a>
  </body>
</html>
