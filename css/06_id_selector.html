<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Id Selector" />
    <title>Id Selector</title>
    <style>
      * {
        margin: 0;
      }
      #title1 {
        /* 글자색 블루, 가로 300px,높이 400px, 배경색: green */
        color: blue;
        width: 300px;
        height: 400px;
        background-color: green;
      }
      #title2 {
        /* 글자색 레드, 배경색 블랙 */
        color: red;
        background-color: black;
      }
      #title3 {
        /* 글자색 블랙, 배경색 그레이 */
        color: black;
        background-color: gray;
      }
    </style>
  </head>
  <body>
    <h1 id="title1">Title</h1>
    <h1 id="title2">Title</h1>
    <h1 id="title3">Title</h1>
  </body>
</html>
