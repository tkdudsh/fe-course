<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Starbucks layout" />
    <title>Starbucks layout</title>
    <style>
      body {
        background-color: #f6f5ef;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 1000px;
        margin: auto;
      }
      ul {
        display: flex;
        list-style: none;
        gap: 30px;
        justify-content: right;
        align-items: center;
      }
      ul a {
        text-decoration: none;
        color: #333;
      }
      .header-top-nav {
        padding-right: 50px;
        font-size: 0.8em;
      }
      .Logo {
        height: 80px;
        width: 80px;
      }
      .Search {
        padding: 3px;
        border: 2px solid lightgray;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header">
        <img
          class="Logo"
          src="https://www.starbucks.co.kr/common/img/common/logo.png"
          alt="스타벅스 로고"
        />

        <div>
          <nav class="header-top-nav">
            <ul>
              <li><a href="#">Sign in</a></li>
              <li><a href="#">MyStrbucks</a></li>
              <li><a href="#">Customer Service & Ideas</a></li>
              <li><a href="#">Find a Store</a></li>
              <li>
                <a href=""
                  ><img
                    class="Search"
                    src="https://image.istarbucks.co.kr/common/img/common/icon_magnifier_black.png"
                    alt=""
                /></a>
              </li>
            </ul>
          </nav>
          <nav class="header-bot-nav">
            <ul>
              <li><a href="">COFFEE</a></li>
              <li><a href="">MENU</a></li>
              <li><a href="">STORE</a></li>
              <li><a href="">ESG</a></li>
              <li><a href="">STARBUCKS REWARDS</a></li>
              <li><a href="">CORPORATE SALES</a></li>
              <li><a href="">WHAT'S NEW</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
  </body>
</html>
