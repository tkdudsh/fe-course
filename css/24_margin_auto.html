<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Margin Auto</title>
    <style>
      h1 {
        width: 50%;
        height: 200px;
        background-color: beige;
        margin: auto;
      }
      div {
        margin: auto;
        width: 70%;
        height: 500px;
        background-color: lightgreen;
      }
      p {
        border: green 8px solid;
        width: 800px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <h1>margin-auto</h1>
    <div>
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Atque dolores
        error necessitatibus modi eaque ad placeat illo? Nihil aperiam
        aspernatur voluptate in. Nostrum quisquam accusantium libero obcaecati
        ipsum magnam recusandae.
      </p>
    </div>
  </body>
</html>
