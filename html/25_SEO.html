<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO</title>
    <meta name="description" content="SEO 개념을 숙지합니다." />
  </head>
  <body>
    <!--   
    Search Engine optimization(SEO) - 검색 엔진 최적화*
    개념: 검색엔진에서 상위 노출되도록 웹사이트를 최적화 하는 기술.
    검색엔진 EX) Google, Naver, Microsoft...

    SEO 핵심 기술
    -HTML5 시맨틱 태그(header,main,footer....)
    -title
    -heading tag
    -meta description
    -content: img-alt, label-for ...

    Seo를 추가하여 개발되는 사이트
    -블로그, 쇼핑몰, 교육사이트
    -->

    <!--<h1>HTML4 Layout</h1>
    <div id="header">Header</div>
    <div id="content">Content</div>
    <div id="footer">Footer</div>
  -->

    <h1>HTML5 Layout</h1>
    <header>Header</header>
    <main>Content</main>
    <footer>Footer</footer>
  </body>
</html>
