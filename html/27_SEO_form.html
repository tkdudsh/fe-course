<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 폼</title>
    <meta name="description" content="회원가입폼" />
    <style>
        li{
            list-style-type: none;
        }
        form{
            width:50%;
        }
    </style>
  </head>
  <body>
    <main>
    <h1>회원가입 폼</h1>

    <form action="#" method="get">
      <!-- GET : 서버에 데이터 전송 방식으로 URL을 사용함, Query String
       네트웍 패킷의 헤더에 함께 전송-->
      <!--Post : 서버에 데이터 전송시 네트웍패킹의 바디에 함께 전송-->
      <ul>
        <fieldset>
            <legend>개인정보 입력</legend>
        
        <li>
          <label for="name">이름</label>
          <input type="text" name="name" id="name"/> <!-- id값을 주지 않으면 accessibility가 낮아질 것  li는 fieldset 자식으로 있을때도 낮아짐-->
        </li>
        <li>
          <label for="id">아이디</label>
          <input type="text" name="id" id="id" />
        </li>
        <li>
          <label for="pass">패스워드</label>
          <input type="password" name="pass" id="pass"/>
        </li>
        <!-- <fieldset>
          <legend>주소 선택 탭</legend> -->
          <li>
            <label for="address1">주소</label>
            <input type="text" name="address1" id="address1" />
          </li>
          <li>
            <label for="address2">주소선택</label>
            <input type="radio" name="address2" value="서울시" id="address2"/><span
              >서울시</span
            >
            <input type="radio" name="address2" value="부산시" id="address2" /><span
              >부산시</span
            >
            <input type="radio" name="address2" value="인천시" id="address2" /><span
              >인천시</span
            >
          </li>
          <li>
            <label for="address3">주소선택</label>
            <input type="checkbox" name="address3" value="서울시" id="address3"/><span
              >서울시</span
            >
            <input type="checkbox" name="address3" value="부산시" id="address3"/><span
              >부산시</span
            >
            <input type="checkbox" name="address3" value="인천시" id="address3"/><span
              >인천시</span
            >
          </li>
          <li>
            <label for="address4">주소선택 </label>
            <select name="address4" id="address4">
              <option value="선택하세요" id="address4">선택하세요</option>
              <option value="서울시" id="address4">서울시</option>
              <option value="부산시" id="address4">부산시</option>
              <option value="인천시" id="address4">인천시</option>
            </select>
          </li>
        <!-- </fieldset> -->

        <li>
          <label for="birth">생년월일 </label>
          <input type="date" name="birth" id="birth" />
        </li>
        <li>
          <label for="photo">사진 업로드 </label>
          <input type="file" name="photo"  id="photo"/>
        </li>
        <li>
          <label for="intro">자기소개 </label>
          <textarea name="intro" cols="100" rows="5" id="intro"></textarea>
        </li>
        <li>
          <button type="submit">전송</button>
          <button type="reset">초기화</button>
        </li>
      </ul>
      </fieldset>
    </form>
    </main>
  </body>
</html>
