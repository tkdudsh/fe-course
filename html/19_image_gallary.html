<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <style>
      ul,
      section {
        /*property: value*/
        list-style-type: none;
        display: flex;
        gap: 10px;
      }
      img {
        width: 200px;
      }

      li,
      article,
      figure,
      figcaption {
        border: 1px solid rgb(212, 208, 208);
      }
      div {
        text-align: center;
        padding: 5px;
        padding-bottom: 10px;
      }
      p {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Image Gallery List</h1>

    <ul>
      <li>
        <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="" />
        <div>Cinque Terre</div>
      </li>
      <li>
        <img src="https://www.w3schools.com/css/img_forest.jpg" alt="" />
        <div>Green Forest</div>
      </li>
      <li>
        <img src="https://www.w3schools.com/css/img_lights.jpg" alt="" />
        <div>Northern Lights</div>
      </li>
      <li>
        <img src="https://www.w3schools.com/css/img_mountains.jpg" alt="" />
        <div>Mountains</div>
      </li>
    </ul>
    <hr />

    <h1>Image Gallery Semantic</h1>
    <section>
      <article>
        <figure>
          <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="" />
          <figcaption>
            <p>Cinque Terre</p>
          </figcaption>
        </figure>
      </article>

      <article>
        <figure>
          <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="" />
          <figcaption>
            <p>Cinque Terre</p>
          </figcaption>
        </figure>
      </article>
    </section>
  </body>
</html>
