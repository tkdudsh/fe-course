<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <h1>Table</h1>

    <table border="1">
      <tr>
        <th>번호</th>
        <th>상품명</th>
        <th>가격</th>
      </tr>
      <tr>
        <td rowspan="2">1</td>
        <td>모니터</td>
        <td>3000</td>
      </tr>
      <tr>
        <td>키보드</td>
        <td>2000</td>
      </tr>
      <tr>
        <td>3</td>
        <td>마우스</td>
        <td>1000</td>
      </tr>
      <tr>
        <td colspan="3">4</td>
      </tr>
      <tr>
        <th colspan="2">합계</th>

        <td>6000</td>
      </tr>
    </table>
  </body>
</html>
