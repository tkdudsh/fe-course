<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 폼</title>
    <style>
        li{
            list-style-type: none;
        }
        form{
            width:50%;
        }
    </style>
  </head>
  <body>
    <h1>회원가입 폼</h1>
    <a href="#field2">기타항목</a>

    <form action="#" method="get">
      <!-- GET : 서버에 데이터 전송 방식으로 URL을 사용함, Query String
       네트웍 패킷의 헤더에 함께 전송-->
      <!--Post : 서버에 데이터 전송시 네트웍패킹의 바디에 함께 전송-->
      <ul>
        <fieldset>
            <legend>개인정보 입력</legend>
        
        <li>
          <label for="name">이름</label>
          <input type="text" name="name" />
        </li>
        <li>
          <label for="id">아이디</label>
          <input type="text" name="id" />
        </li>
        <li>
          <label for="pass">패스워드</label>
          <input type="password" name="pass" />
        </li>
        <fieldset>
          <legend>주소 선택 탭</legend>
          <li>
            <label for="address1">주소</label>
            <input type="text" name="address1" />
          </li>
          <li>
            <label for="address2">주소선택</label>
            <input type="radio" name="address2" value="서울시" /><span
              >서울시</span
            >
            <input type="radio" name="address2" value="부산시" /><span
              >부산시</span
            >
            <input type="radio" name="address2" value="인천시" /><span
              >인천시</span
            >
          </li>
          <li>
            <label for="address3">주소선택</label>
            <input type="checkbox" name="address3" value="서울시" /><span
              >서울시</span
            >
            <input type="checkbox" name="address3" value="부산시" /><span
              >부산시</span
            >
            <input type="checkbox" name="address3" value="인천시" /><span
              >인천시</span
            >
          </li>
          <li>
            <label for="address4">주소선택 </label>
            <select name="address4">
              <option value="선택하세요">선택하세요</option>
              <option value="서울시">서울시</option>
              <option value="부산시">부산시</option>
              <option value="인천시">인천시</option>
            </select>
          </li>
        </fieldset>

        <li>
          <label for="birth">생년월일 </label>
          <input type="date" name="birth" />
        </li>
        <li>
          <label for="photo">사진 업로드 </label>
          <input type="file" name="photo" />
        </li>
        <li>
          <label for="intro">자기소개 </label>
          <textarea name="intro" cols="100" rows="5"></textarea>
        </li>
        <li>
          <button type="submit">전송</button>
          <button type="reset">초기화</button>
        </li>
      </ul>
      </fieldset>
      <fieldset>
        <legend>기타항목입력</legend>
      </fieldset>
    </form>
  </body>
</html>
